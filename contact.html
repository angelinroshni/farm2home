<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - Farm2Home</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: linear-gradient(to right, #c8e6c9, #e8f5e9);
}

/* Header */
header {
  background: #2e7d32;
  color: white;
  text-align: center;
  padding: 20px;
}

/* Container */
.container {
  max-width: 1000px;
  margin: 40px auto;
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
}

/* Left Info Box */
.info-box {
  flex: 1;
  background: #ffffff;
  padding: 25px;
  border-radius: 15px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

.info-box h2 {
  color: #2e7d32;
}

.info-box p {
  font-size: 16px;
  margin: 10px 0;
}

/* Form Box */
.form-box {
  flex: 1;
  background: #ffffff;
  padding: 25px;
  border-radius: 15px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

.form-box h2 {
  color: #2e7d32;
  text-align: center;
}

/* Inputs */
input, textarea {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-size: 14px;
}

/* Button */
button {
  width: 100%;
  padding: 12px;
  background: #66bb6a;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #388e3c;
}

/* Footer */
footer {
  text-align: center;
  padding: 15px;
  background: #2e7d32;
  color: white;
  margin-top: 30px;
}
</style>

</head>
<body>

<header>
<h1>📞 Contact Farm2Home</h1>
</header>

<div class="container">

<!-- Contact Info -->
<div class="info-box">
<h2>Get in Touch</h2>
<p>🌱 Farm2Home</p>
<p>📍 Chennai, Tamil Nadu</p>
<p>📧 farm2home@email.com</p>
<p>📱 +91 98765 43210</p>

<p>
We are here to help you with fresh products and any queries. Feel free to contact us anytime!
</p>
</div>

<!-- Contact Form -->
<div class="form-box">
<h2>Send Message</h2>

<form>
<input type="text" placeholder="Your Name" required>
<input type="email" placeholder="Your Email" required>
<textarea rows="5" placeholder="Your Message" required></textarea>
<button type="submit">Send Message</button>
</form>

</div>

</div>

<footer>
<p>🌿 Fresh from Farm to Your Doorstep</p>
</footer>

</body>
</html>
