<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Farm2Home</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(to right, #66bb6a, #a5d6a7);
}

/* Main Box */
.container {
  width: 350px;
  background: white;
  padding: 30px;
  border-radius: 15px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.3);
  text-align: center;
}

/* Heading */
h2 {
  color: #2e7d32;
}

/* Inputs */
input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}

/* Button */
button {
  width: 100%;
  padding: 12px;
  background: #2e7d32;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #1b5e20;
}

/* Toggle Text */
.toggle {
  margin-top: 15px;
  color: #555;
  cursor: pointer;
}

.toggle span {
  color: #2e7d32;
  font-weight: bold;
}
</style>

</head>
<body>

<div class="container">

<!-- Login Form -->
<div id="loginForm">
<h2>Login</h2>
<form>
<input type="email" placeholder="Email" required>
<input type="password" placeholder="Password" required>
<button type="submit">Login</button>
</form>
<p class="toggle">Don't have an account? <span onclick="showSignup()">Sign Up</span></p>
</div>

<!-- Signup Form -->
<div id="signupForm" style="display:none;">
<h2>Sign Up</h2>
<form>
<input type="text" placeholder="Full Name" required>
<input type="email" placeholder="Email" required>
<input type="password" placeholder="Password" required>
<input type="password" placeholder="Confirm Password" required>
<button type="submit">Register</button>
</form>
<p class="toggle">Already have an account? <span onclick="showLogin()">Login</span></p>
</div>

</div>

<script>
function showSignup(){
  document.getElementById("loginForm").style.display = "none";
  document.getElementById("signupForm").style.display = "block";
}

function showLogin(){
  document.getElementById("signupForm").style.display = "none";
  document.getElementById("loginForm").style.display = "block";
}
</script>

</body>
</html>
